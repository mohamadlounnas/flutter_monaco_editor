name: flutter_monaco_editor_desktop
description: Desktop (Linux, Windows, macOS) implementation for flutter_monaco_editor — uses webview_cef (Chromium Embedded Framework) to host Monaco.
version: 0.5.0-dev
publish_to: 'none'
repository: https://github.com/outr/flutter_monaco_editor
issue_tracker: https://github.com/outr/flutter_monaco_editor/issues

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_monaco_editor:
    path: ../flutter_monaco_editor
  webview_cef: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
